<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Make Account Transfer | Fineract</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-gray-50 min-h-screen flex">

    <!-- Sidebar -->
    <aside class="w-64 bg-white border-r border-gray-100 fixed inset-y-0 left-0 z-30 flex flex-col">
        <div class="h-16 flex items-center px-6 border-b border-gray-100">
            <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center">
                <span class="text-white font-bold text-sm">F</span>
            </div>
            <span class="ml-3 font-bold text-gray-900 text-lg">Fineract</span>
        </div>
        <nav class="flex-1 px-3 py-4 space-y-1 text-sm overflow-y-auto">
            <a href="#" class="flex items-center px-3 py-2 rounded-lg text-gray-600 hover:bg-gray-50">
                <svg class="w-5 h-5 mr-3 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-4 0a1 1 0 01-1-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 01-1 1"/></svg>
                Dashboard
            </a>
            <a href="#" class="flex items-center px-3 py-2 rounded-lg text-gray-600 hover:bg-gray-50">
                <svg class="w-5 h-5 mr-3 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                Clients
            </a>
            <a href="#" class="flex items-center px-3 py-2 rounded-lg text-gray-600 hover:bg-gray-50">
                <svg class="w-5 h-5 mr-3 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg>
                Products
            </a>
            <a href="#" class="flex items-center px-3 py-2 rounded-lg text-gray-600 hover:bg-gray-50">
                <svg class="w-5 h-5 mr-3 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 7h6m0 10v-3m-3 3h.01M9 17h.01M9 14h.01M12 14h.01M15 11h.01M12 11h.01M9 11h.01M7 21h10a2 2 0 002-2V5a2 2 0 00-2-2H7a2 2 0 00-2 2v14a2 2 0 002 2z"/></svg>
                Accounting
            </a>
            <div>
                <a href="#" class="flex items-center px-3 py-2 rounded-lg bg-blue-50 text-blue-700 font-medium">
                    <svg class="w-5 h-5 mr-3 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"/></svg>
                    Account Transfers
                </a>
                <div class="ml-8 mt-1 space-y-1">
                    <a href="#" class="block px-3 py-1.5 rounded-lg text-blue-700 bg-blue-50/60 font-medium text-xs">Make Transfer</a>
                    <a href="#" class="block px-3 py-1.5 rounded-lg text-gray-500 hover:bg-gray-50 text-xs">Standing Instructions</a>
                    <a href="#" class="block px-3 py-1.5 rounded-lg text-gray-500 hover:bg-gray-50 text-xs">Transfer History</a>
                </div>
            </div>
            <a href="#" class="flex items-center px-3 py-2 rounded-lg text-gray-600 hover:bg-gray-50">
                <svg class="w-5 h-5 mr-3 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                System
            </a>
        </nav>
        <div class="p-4 border-t border-gray-100">
            <div class="flex items-center">
                <div class="w-8 h-8 bg-blue-100 rounded-full flex items-center justify-center text-blue-700 font-semibold text-xs">AW</div>
                <div class="ml-3">
                    <p class="text-sm font-medium text-gray-900">Amina Wanjiku</p>
                    <p class="text-xs text-gray-500">Westlands Branch</p>
                </div>
            </div>
        </div>
    </aside>

    <!-- Main -->
    <div class="flex-1 ml-64">
        <!-- Header -->
        <header class="sticky top-0 z-20 h-16 bg-white border-b border-gray-100 flex items-center justify-between px-8">
            <nav class="flex items-center text-sm text-gray-500">
                <a href="#" class="hover:text-blue-600">Home</a>
                <svg class="w-4 h-4 mx-2 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
                <a href="#" class="hover:text-blue-600">Account Transfers</a>
                <svg class="w-4 h-4 mx-2 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
                <span class="text-gray-900 font-medium">Make Transfer</span>
            </nav>
            <div class="flex items-center space-x-4">
                <button class="relative p-2 text-gray-400 hover:text-gray-600">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/></svg>
                </button>
            </div>
        </header>

        <main class="p-8">
            <h1 class="text-2xl font-bold text-gray-900 mb-8">Make Account Transfer</h1>

            <div class="max-w-3xl">
                <div class="bg-white rounded-2xl border border-gray-100 shadow-sm p-8">
                    <!-- From Section -->
                    <div class="mb-8">
                        <h3 class="text-base font-semibold text-gray-900 mb-5 flex items-center">
                            <span class="w-7 h-7 rounded-full bg-blue-100 text-blue-700 flex items-center justify-center text-xs font-bold mr-3">1</span>
                            Transfer From
                        </h3>
                        <div class="space-y-5 pl-10">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-2">Account Type</label>
                                <div class="flex space-x-4">
                                    <label class="flex items-center px-4 py-2.5 border border-gray-200 rounded-xl cursor-pointer hover:bg-gray-50 transition-colors">
                                        <input type="radio" name="from_type" class="w-4 h-4 text-blue-600 border-gray-300 focus:ring-blue-500">
                                        <span class="ml-2 text-sm text-gray-700">Loan</span>
                                    </label>
                                    <label class="flex items-center px-4 py-2.5 border-2 border-blue-500 bg-blue-50/50 rounded-xl cursor-pointer transition-colors">
                                        <input type="radio" name="from_type" checked class="w-4 h-4 text-blue-600 border-gray-300 focus:ring-blue-500">
                                        <span class="ml-2 text-sm font-medium text-blue-700">Savings</span>
                                    </label>
                                </div>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1.5">Client</label>
                                <div class="relative">
                                    <input type="text" value="Esther Nyambura (MBR-001302)" class="w-full px-4 py-2.5 border border-gray-200 rounded-xl text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-shadow pr-10">
                                    <svg class="w-4 h-4 text-gray-400 absolute right-3 top-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                                </div>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1.5">Account</label>
                                <select class="w-full px-4 py-2.5 border border-gray-200 rounded-xl text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-shadow bg-white">
                                    <option>SA-00089742 - Ordinary Savings (KES 234,500)</option>
                                    <option>SA-00089743 - Fixed Deposit (KES 500,000)</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <!-- Divider with arrow -->
                    <div class="flex items-center justify-center my-2">
                        <div class="flex-1 h-px bg-gray-100"></div>
                        <div class="mx-4 w-10 h-10 rounded-full bg-blue-50 flex items-center justify-center">
                            <svg class="w-5 h-5 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 14l-7 7m0 0l-7-7m7 7V3"/></svg>
                        </div>
                        <div class="flex-1 h-px bg-gray-100"></div>
                    </div>

                    <!-- To Section -->
                    <div class="mb-8 mt-6">
                        <h3 class="text-base font-semibold text-gray-900 mb-5 flex items-center">
                            <span class="w-7 h-7 rounded-full bg-green-100 text-green-700 flex items-center justify-center text-xs font-bold mr-3">2</span>
                            Transfer To
                        </h3>
                        <div class="space-y-5 pl-10">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-2">Account Type</label>
                                <div class="flex space-x-4">
                                    <label class="flex items-center px-4 py-2.5 border border-gray-200 rounded-xl cursor-pointer hover:bg-gray-50 transition-colors">
                                        <input type="radio" name="to_type" class="w-4 h-4 text-blue-600 border-gray-300 focus:ring-blue-500">
                                        <span class="ml-2 text-sm text-gray-700">Loan</span>
                                    </label>
                                    <label class="flex items-center px-4 py-2.5 border-2 border-blue-500 bg-blue-50/50 rounded-xl cursor-pointer transition-colors">
                                        <input type="radio" name="to_type" checked class="w-4 h-4 text-blue-600 border-gray-300 focus:ring-blue-500">
                                        <span class="ml-2 text-sm font-medium text-blue-700">Savings</span>
                                    </label>
                                </div>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1.5">Client</label>
                                <div class="relative">
                                    <input type="text" value="Grace Kemunto (MBR-001247)" class="w-full px-4 py-2.5 border border-gray-200 rounded-xl text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-shadow pr-10">
                                    <svg class="w-4 h-4 text-gray-400 absolute right-3 top-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                                </div>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1.5">Account</label>
                                <select class="w-full px-4 py-2.5 border border-gray-200 rounded-xl text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-shadow bg-white">
                                    <option>SA-00089742 - Ordinary Savings (KES 234,500)</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <hr class="border-gray-100 my-6">

                    <!-- Transfer Details -->
                    <div class="mb-8">
                        <h3 class="text-base font-semibold text-gray-900 mb-5 flex items-center">
                            <span class="w-7 h-7 rounded-full bg-purple-100 text-purple-700 flex items-center justify-center text-xs font-bold mr-3">3</span>
                            Transfer Details
                        </h3>
                        <div class="space-y-5 pl-10">
                            <div class="grid grid-cols-2 gap-5">
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-1.5">Transfer Amount (KES)</label>
                                    <input type="text" placeholder="0.00" class="w-full px-4 py-2.5 border border-gray-200 rounded-xl text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-shadow">
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-1.5">Transfer Date</label>
                                    <input type="date" value="2026-03-30" class="w-full px-4 py-2.5 border border-gray-200 rounded-xl text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-shadow">
                                </div>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1.5">Description</label>
                                <textarea rows="3" placeholder="Optional transfer description..." class="w-full px-4 py-2.5 border border-gray-200 rounded-xl text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-shadow resize-none"></textarea>
                            </div>
                        </div>
                    </div>

                    <!-- Actions -->
                    <div class="flex justify-end space-x-4 pt-4 border-t border-gray-100">
                        <button class="px-6 py-2.5 border border-gray-200 text-gray-600 text-sm font-medium rounded-xl hover:bg-gray-50 transition-colors">Cancel</button>
                        <button class="px-6 py-2.5 bg-blue-600 text-white text-sm font-medium rounded-xl hover:bg-blue-700 transition-colors">Submit Transfer</button>
                    </div>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
