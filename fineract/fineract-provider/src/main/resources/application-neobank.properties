# ============================================================
# NeoBank — Application Profile Override
# Activate via: SPRING_PROFILES_ACTIVE=neobank
# ============================================================

application.title=NeoBank Digital Banking Platform

# ── Timezone ──
fineract.tenant.timezone=Africa/Nairobi

# ── Tenant ──
fineract.tenant.identifier=default
fineract.tenant.name=fineract_default
fineract.tenant.description=NeoBank Digital Banking - Kenya

# ── CORS (allow NeoBank frontends) ──
fineract.security.cors.enabled=true
fineract.security.cors.allowed-origin-patterns=http://localhost:5173,http://localhost:5174,https://neo.fineract.us,https://*.neobank.co.ke

# ── Disable unused features ──
fineract.security.2fa.enabled=false

# ── Content ──
fineract.content.filesystem.root-folder=/tmp/neobank-content

# ── Monitoring ──
management.metrics.tags.application=neobank-fineract
