debug=true

fineract.command.enabled=true
fineract.command.jdbc.enabled=true
fineract.command.jdbc.file-dead-letter-queue-enabled=true
fineract.command.jdbc.file-dead-letter-queue-path=./build/fineract/dlq

spring.liquibase.enabled=true
spring.liquibase.drop-first=true
spring.liquibase.default-schema=public
spring.liquibase.change-log=classpath:/db/changelog/tenant/module/command/module-changelog-master.xml
