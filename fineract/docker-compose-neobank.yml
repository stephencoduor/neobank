version: "3.8"

services:
  neobank-db:
    image: postgres:16
    container_name: neobank-db
    restart: always
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: neobank_db_secret_2026
    volumes:
      - ./config/docker/postgresql/docker-entrypoint-initdb.d/01-init-neobank.sh:/docker-entrypoint-initdb.d/01-init.sh:ro
      - neobank-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-q", "-d", "postgres", "-U", "root"]
      timeout: 10s
      retries: 10
    ports:
      - "5432:5432"
    networks:
      - neobank-net

  neobank-fineract:
    image: fineract:latest
    container_name: neobank-fineract
    restart: always
    depends_on:
      neobank-db:
        condition: service_healthy
    environment:
      # ── Database ──
      FINERACT_HIKARI_DRIVER_SOURCE_CLASS_NAME: org.postgresql.Driver
      FINERACT_HIKARI_JDBC_URL: jdbc:postgresql://neobank-db:5432/fineract_tenants
      FINERACT_HIKARI_USERNAME: postgres
      FINERACT_HIKARI_PASSWORD: neobank_db_secret_2026
      FINERACT_HIKARI_MINIMUM_IDLE: "3"
      FINERACT_HIKARI_MAXIMUM_POOL_SIZE: "10"
      FINERACT_HIKARI_IDLE_TIMEOUT: "60000"
      FINERACT_HIKARI_CONNECTION_TIMEOUT: "20000"
      FINERACT_HIKARI_TEST_QUERY: "SELECT 1"
      FINERACT_HIKARI_AUTO_COMMIT: "true"
      # ── Tenant ──
      FINERACT_DEFAULT_TENANTDB_HOSTNAME: neobank-db
      FINERACT_DEFAULT_TENANTDB_PORT: "5432"
      FINERACT_DEFAULT_TENANTDB_UID: postgres
      FINERACT_DEFAULT_TENANTDB_PWD: neobank_db_secret_2026
      FINERACT_DEFAULT_TENANTDB_CONN_PARAMS: ""
      FINERACT_DEFAULT_TENANTDB_TIMEZONE: Africa/Nairobi
      FINERACT_DEFAULT_TENANTDB_IDENTIFIER: default
      FINERACT_DEFAULT_TENANTDB_NAME: fineract_default
      FINERACT_DEFAULT_TENANTDB_DESCRIPTION: NeoBank Digital Banking - Kenya
      FINERACT_DEFAULT_MASTER_PASSWORD: neobank_master_2026
      # ── Security ──
      FINERACT_SECURITY_BASICAUTH_ENABLED: "true"
      FINERACT_SECURITY_OAUTH_ENABLED: "false"
      FINERACT_SECURITY_2FA_ENABLED: "false"
      FINERACT_SECURITY_CORS_ENABLED: "true"
      FINERACT_SECURITY_CORS_ALLOWED_ORIGIN_PATTERNS: "http://localhost:5173,http://localhost:5174,https://neo.fineract.us,https://*.neobank.co.ke"
      # ── Server ──
      FINERACT_SERVER_SSL_ENABLED: "true"
      FINERACT_NODE_ID: "1"
      FINERACT_INSECURE_HTTP_CLIENT: "true"
      FINERACT_CONTENT_FILESYSTEM_ROOT_FOLDER: /tmp
      # ── Monitoring ──
      FINERACT_MANAGEMENT_ENDPOINT_WEB_EXPOSURE_INCLUDE: health,info,prometheus
      FINERACT_MANAGEMENT_METRICS_TAGS_APPLICATION: neobank-fineract
      # ── Jobs ──
      FINERACT_REMOTE_JOB_MESSAGE_HANDLER_SPRING_EVENTS_ENABLED: "true"
      FINERACT_JOB_LOAN_COB_ENABLED: "true"
      # ── JVM ──
      JAVA_TOOL_OPTIONS: >-
        -Xmx1G
        -XX:MinRAMPercentage=25
        -XX:MaxRAMPercentage=80
        -Duser.timezone=Africa/Nairobi
        --add-exports=java.naming/com.sun.jndi.ldap=ALL-UNNAMED
        --add-opens=java.base/java.lang=ALL-UNNAMED
        --add-opens=java.base/java.lang.invoke=ALL-UNNAMED
        --add-opens=java.base/java.io=ALL-UNNAMED
        --add-opens=java.base/java.security=ALL-UNNAMED
        --add-opens=java.base/java.util=ALL-UNNAMED
        --add-opens=java.management/javax.management=ALL-UNNAMED
        --add-opens=java.naming/javax.naming=ALL-UNNAMED
    volumes:
      - ./build/fineract/logs:/var/logs/fineract:rw
    ports:
      - "8443:8443"
      - "8080:8080"
    healthcheck:
      test: ["CMD", "sh", "-c", "nc -z localhost 8443"]
      timeout: 10s
      retries: 30
      interval: 5s
    networks:
      - neobank-net

volumes:
  neobank-pgdata:

networks:
  neobank-net:
    driver: bridge
